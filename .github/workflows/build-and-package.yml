name: build-and-package

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: build-and-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bash scripts/install_ubuntu_24.04.sh

      - name: Build + package (.deb)
        run: bash scripts/package_deb.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb
          if-no-files-found: error

  windows-zip:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (for aqt)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.4.2
          arch: win64_msvc2019_64
          cache: true

      - name: Package (portable .zip)
        shell: pwsh
        run: .\scripts\package_windows.ps1 -BuildDir build -Config Release -OutDir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.zip
          if-no-files-found: error

  macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (for aqt)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.4.2
          arch: clang_64
          cache: true

      - name: Package (.dmg)
        run: bash scripts/package_macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - linux-deb
      - windows-zip
      - macos-dmg
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.deb
            dist/**/*.zip
            dist/**/*.dmg
